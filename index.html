<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootyManager | Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        
        <div id="screen-selection" class="screen">
            <div class="header-block">
                <h1>Footy<span>Manager</span></h1>
                <p>Select your club for the 24/25 campaign</p>
            </div>
            <div id="team-list" class="grid-container scrollable"></div>
        </div>

        <div id="screen-hub" class="screen hidden">
            <div class="hub-header">
                <div class="team-badge">
                    <img id="hub-logo" src="">
                    <div>
                        <h2 id="hub-name">Team</h2>
                        <span id="hub-gw" class="badge">GW 1</span>
                    </div>
                </div>
            </div>

            <div class="next-match-card">
                <p class="label">NEXT FIXTURE</p>
                <h2 id="hub-next-opp">vs Opponent</h2>
                <button onclick="goToPreMatch()" class="btn-primary pulse-btn">Match Prep</button>
            </div>
            
            <div class="nav-grid">
                <button onclick="switchScreen('standings')" class="btn-nav">🏆 Table</button>
                <button onclick="openCalendar()" class="btn-nav">📅 Calendar</button>
                <button onclick="switchScreen('settings')" class="btn-nav">⚙️ Settings</button>
            </div>
        </div>

        <div id="screen-pre-match" class="screen hidden">
            <div class="header-block">
                <h2>Matchday</h2>
            </div>
            <div class="matchup-display">
                <div class="team-side">
                    <img id="pre-h-logo" src="">
                    <h3 id="pre-h-name">Home</h3>
                </div>
                <div class="vs-badge">VS</div>
                <div class="team-side">
                    <img id="pre-a-logo" src="">
                    <h3 id="pre-a-name">Away</h3>
                </div>
            </div>
            <div class="action-buttons">
                <button id="btn-start-match" class="btn-primary">Kick Off</button>
                <button onclick="switchScreen('hub')" class="btn-secondary">Back to Hub</button>
            </div>
        </div>

        <div id="screen-match" class="screen hidden">
            <div id="match-arena" class="arena">
                <div class="clock-display">
                    <span id="m-clock">0</span><span id="m-extra" class="extra-time"></span>'
                </div>
                <div class="scoreboard">
                    <div class="score-team"><img id="m-h-logo" src=""><span id="m-h-name">Home</span></div>
                    <div class="score-center" id="m-score">0 - 0</div>
                    <div class="score-team"><span id="m-a-name">Away</span><img id="m-a-logo" src=""></div>
                </div>
                
                <div id="m-alert" class="event-banner hidden">GOAL!</div>
                
                <div class="commentary-box scrollable">
                    <ul id="m-events"></ul>
                </div>
            </div>
            <button id="btn-finish-match" class="btn-primary hidden" onclick="finalizeWeek()">Continue</button>
        </div>

        <div id="screen-standings" class="screen hidden">
            <div class="header-block">
                <h2>League Table</h2>
            </div>
            <div class="table-container scrollable">
                <table id="league-table">
                    <thead><tr><th>#</th><th>Club</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <button onclick="switchScreen('hub')" class="btn-secondary mt-15">Back to Hub</button>
        </div>

        <div id="screen-calendar" class="screen hidden">
            <div class="header-block">
                <h2>Fixtures & Results</h2>
            </div>
            <div class="calendar-controls">
                <button onclick="changeCalendarWeek(-1)" class="btn-icon">◀</button>
                <h3 id="cal-gw-title">Gameweek 1</h3>
                <button onclick="changeCalendarWeek(1)" class="btn-icon">▶</button>
            </div>
            <div id="calendar-list" class="fixture-list scrollable"></div>
            <button onclick="switchScreen('hub')" class="btn-secondary mt-15">Back to Hub</button>
        </div>

        <div id="screen-settings" class="screen hidden">
            <div class="header-block">
                <h2>Settings</h2>
            </div>
            <div class="settings-card">
                <label>Match Speed: <span id="speed-label" class="badge">1x</span></label>
                <input type="range" id="speed-slider" min="1" max="20" value="1" class="slider">
            </div>
            <button onclick="switchScreen('hub')" class="btn-secondary mt-15">Back to Hub</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
