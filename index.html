<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PL Manager 24/25 - Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Premier League Manager</h1>
            <h2 id="gameweek-header" class="hidden">Gameweek <span id="gw-number">1</span></h2>
        </header>

        <div id="screen-selection" class="screen">
            <h3>Select Your Club</h3>
            <div id="team-list" class="grid-list"></div>
        </div>

        <div id="screen-pre-match" class="screen hidden">
            <div class="match-intro">
                <div class="intro-team">
                    <img id="intro-home-logo" src="" alt="">
                    <h2 id="intro-home-name">Home</h2>
                </div>
                <div class="vs">VS</div>
                <div class="intro-team">
                    <img id="intro-away-logo" src="" alt="">
                    <h2 id="intro-away-name">Away</h2>
                </div>
            </div>
            <button id="btn-start-match" class="primary-btn">Kick Off</button>
        </div>

        <div id="screen-match" class="screen hidden">
            <div class="scoreboard">
                <div class="sb-team">
                    <img id="match-home-logo" src="" class="small-logo">
                    <span id="match-home-team">Home</span>
                </div>
                <span id="match-score">0 - 0</span>
                <div class="sb-team">
                    <span id="match-away-team">Away</span>
                    <img id="match-away-logo" src="" class="small-logo">
                </div>
            </div>
            
            <div class="match-controls">
                <div class="clock">Min: <span id="match-clock">0</span><span id="extra-time-display"></span>'</div>
                <div class="speed-settings">
                    <button class="speed-btn active" data-speed="1000">1x</button>
                    <button class="speed-btn" data-speed="200">5x</button>
                    <button class="speed-btn" data-speed="20">50x</button>
                </div>
            </div>

            <div id="match-event-alert" class="event-alert hidden">Goal!</div>
            
            <div class="commentary-box">
                <ul id="event-log"></ul>
            </div>
            
            <button id="btn-resume-half" class="primary-btn hidden">Start Second Half</button>
            <button id="btn-continue-post" class="primary-btn hidden">Match Report</button>
        </div>

        <div id="screen-post-match" class="screen hidden">
            <div class="post-match-grid">
                <div class="results-section">
                    <h3>Results</h3>
                    <ul id="gw-results"></ul>
                </div>
                <div class="table-section">
                    <h3>League Table</h3>
                    <table id="league-table">
                        <thead>
                            <tr><th>Pos</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr>
                        </thead>
                        <tbody id="league-table-body"></tbody>
                    </table>
                </div>
            </div>
            <button id="btn-next-week" class="primary-btn">Next Gameweek</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
