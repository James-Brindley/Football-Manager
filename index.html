<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootyManager 24/25</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <div id="screen-selection" class="screen">
            <header class="page-header">
                <h1>Footy<span>Manager</span></h1>
                <p>Choose your club for the 24/25 Season</p>
            </header>
            <div id="team-list" class="grid-container"></div>
        </div>

        <div id="screen-hub" class="screen hidden">
            <header class="hub-nav">
                <div class="team-info">
                    <img id="hub-logo" src="">
                    <h2 id="hub-name">Team Name</h2>
                </div>
                <div id="hub-gw">Gameweek 1</div>
            </header>

            <div class="hub-menu">
                <div class="next-match-preview">
                    <span>UPCOMING MATCH</span>
                    <h3 id="hub-next-opp">vs Opponent</h3>
                </div>
                
                <div class="menu-grid">
                    <button onclick="goToPreMatch()" class="menu-btn primary">KICK OFF</button>
                    <button onclick="switchScreen('standings')" class="menu-btn">LEAGUE TABLE</button>
                    <button onclick="openCalendar()" class="menu-btn">CALENDAR</button>
                    <button onclick="switchScreen('settings')" class="menu-btn">SETTINGS</button>
                </div>
            </div>
        </div>

        <div id="screen-pre-match" class="screen hidden">
            <div class="page-card">
                <h2>Match Preparation</h2>
                <div class="match-intro">
                    <div class="intro-side">
                        <img id="pre-h-logo" src="">
                        <h3 id="pre-h-name">Home</h3>
                    </div>
                    <div class="vs-circle">VS</div>
                    <div class="intro-side">
                        <img id="pre-a-logo" src="">
                        <h3 id="pre-a-name">Away</h3>
                    </div>
                </div>
                <button id="btn-start-match" class="primary-btn">Start Game</button>
                <button onclick="switchScreen('hub')" class="back-btn">Back to Hub</button>
            </div>
        </div>

        <div id="screen-match" class="screen hidden">
            <div class="match-arena">
                <div class="scoreboard">
                    <div class="sb-side"><img id="m-h-logo" src=""><span id="m-h-name"></span></div>
                    <div class="sb-score" id="m-score">0 - 0</div>
                    <div class="sb-side"><span id="m-a-name"></span><img id="m-a-logo" src=""></div>
                </div>
                <div class="match-time">
                    <span id="m-clock">0</span><span id="m-extra" class="extra-time"></span>'
                </div>
                <div id="m-alert" class="match-alert hidden">GOAL!</div>
                <div class="ticker-box">
                    <ul id="m-events"></ul>
                </div>
            </div>
        </div>

        <div id="screen-standings" class="screen hidden">
            <div class="page-card">
                <h2>League Table</h2>
                <div class="table-scroll">
                    <table id="league-table">
                        <thead><tr><th>#</th><th>Team</th><th>P</th><th>GD</th><th>Pts</th></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
                <button onclick="switchScreen('hub')" class="back-btn">Back to Hub</button>
            </div>
        </div>

        <div id="screen-calendar" class="screen hidden">
            <div class="page-card">
                <h2>Season Fixtures</h2>
                <div id="calendar-list" class="scroll-list"></div>
                <button onclick="switchScreen('hub')" class="back-btn">Back to Hub</button>
            </div>
        </div>

        <div id="screen-settings" class="screen hidden">
            <div class="page-card">
                <h2>Settings</h2>
                <div class="setting-row">
                    <label>Simulation Speed: <span id="speed-label">1x</span></label>
                    <input type="range" id="speed-slider" min="1" max="20" value="1">
                </div>
                <button onclick="switchScreen('hub')" class="back-btn">Back to Hub</button>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
